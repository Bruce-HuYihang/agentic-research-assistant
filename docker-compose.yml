version: "3.9"

services:
  research-api:
    build: .
    container_name: agentic-research
    ports:
      - "8090:8090"
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./sessions:/app/sessions
      - ./knowledge_store:/app/knowledge_store
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端（可选，启动 streamlit）
  research-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-research-ui
    ports:
      - "8501:8501"
    depends_on:
      research-api:
        condition: service_healthy
    command: streamlit run frontend/app.py
    environment:
      - API_URL=http://research-api:8090
    volumes:
      - ./frontend:/app/frontend
    restart: unless-stopped
